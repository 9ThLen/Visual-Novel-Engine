<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spike 001: Block-by-Block Runtime Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0e17; color: #fff; min-height: 100vh; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

  /* ── Background layer ── */
  #bg-layer { position: absolute; inset: 0; transition: background 0.8s; }
  #bg-layer.has-bg { background-size: cover; background-position: center; }

  /* ── Character layer ── */
  #character-layer { position: absolute; inset: 0; display: flex; flex-direction: row; justify-content: center; align-items: flex-end; padding-bottom: 200px; pointer-events: none; }
  .char-sprite { height: 60%; opacity: 0; transition: opacity 0.6s, transform 0.6s; margin: 0 -20px; }
  .char-sprite.visible { opacity: 1; }
  .char-sprite.left { transform: translateX(-60px); }
  .char-sprite.center { transform: translateX(0); }
  .char-sprite.right { transform: translateX(60px); }
  .char-sprite.far-left { transform: translateX(-120px); }
  .char-sprite.far-right { transform: translateX(120px); }

  /* ── Effect overlay ── */
  #effect-overlay { position: absolute; inset: 0; pointer-events: none; }
  #effect-overlay.shake { animation: shake 0.5s; }
  #effect-overlay.flash { background: rgba(255,255,255,0.6); animation: flashOut 0.4s; }
  #effect-overlay.vignette { box-shadow: inset 0 0 120px 40px rgba(0,0,0,0.8); }
  @keyframes shake { 0%,100% { transform: translate(0); } 25% { transform: translate(-4px,2px); } 50% { transform: translate(4px,-2px); } 75% { transform: translate(-2px,4px); } }
  @keyframes flashOut { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* ── Info bar ── */
  #info-bar { position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; justify-content: space-between; padding: 8px 12px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); font-size: 11px; color: rgba(255,255,255,0.6); pointer-events: none; }

  /* ── Dialogue area ── */
  #dialogue-area { position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; padding: 12px; padding-bottom: 24px; }
  #dialogue-box { background: rgba(15,14,23,0.92); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; backdrop-filter: blur(10px); }
  #speaker-name { display: none; background: #7c3aed; color: #fff; font-size: 11px; font-weight: 700; padding: 4px 14px; border-radius: 0 0 12px 0; width: fit-content; letter-spacing: 0.5px; }
  #dialogue-text { padding: 14px 16px; font-size: 15px; line-height: 1.6; min-height: 70px; color: #eee; }
  #dialogue-text .cursor { color: #7c3aed; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── Choices ── */
  #choices-area { display: none; flex-direction: column; gap: 8px; padding: 8px 14px 16px; }
  .choice-btn { border: 1px solid #7c3aed; border-radius: 12px; padding: 10px 16px; background: rgba(124,58,237,0.10); color: #eee; font-size: 14px; cursor: pointer; text-align: center; transition: background 0.2s; }
  .choice-btn:hover { background: rgba(124,58,237,0.25); }

  /* ── Bottom bar ── */
  #bottom-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px 12px; }
  #step-indicator { font-size: 11px; color: rgba(255,255,255,0.35); }
  #action-hint { font-size: 11px; color: rgba(255,255,255,0.4); }

  /* ── Variable inspector ── */
  #vars-panel { position: absolute; top: 0; right: 0; z-index: 20; background: rgba(0,0,0,0.8); border-left: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); border-radius: 0 0 0 12px; padding: 10px 14px; max-width: 200px; font-size: 11px; display: none; }
  #vars-panel h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
  #vars-panel .var-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
  #vars-panel .var-name { color: rgba(255,255,255,0.6); }
  #vars-panel .var-value { color: #7c3aed; font-weight: 600; }
  #vars-toggle { position: absolute; top: 4px; right: 4px; z-index: 25; background: none; border: none; color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer; }

  /* ── Block log ── */
  #block-log { margin-top: 12px; display: none; }
  #block-log h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); margin-bottom: 6px; }
  .log-entry { font-size: 11px; color: rgba(255,255,255,0.5); padding: 2px 0; border-left: 2px solid transparent; padding-left: 8px; margin: 2px 0; }
  .log-entry.executed { border-left-color: #22c55e; color: rgba(255,255,255,0.7); }
  .log-entry.skipped { border-left-color: #666; color: rgba(255,255,255,0.3); text-decoration: line-through; }
  .log-entry.halted { border-left-color: #f59e0b; color: #f59e0b; }
  .log-entry .block-icon { margin-right: 4px; }

  /* ── Halt overlay ── */
  #halt-overlay { position: absolute; inset: 0; z-index: 3; cursor: pointer; }
  #transition-overlay { position: absolute; inset: 0; z-index: 15; background: #000; opacity: 0; pointer-events: none; transition: opacity 0.6s; }
  #transition-overlay.active { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div id="bg-layer"></div>
  <div id="character-layer"></div>
  <div id="effect-overlay"></div>
  <div id="transition-overlay"></div>

  <div id="info-bar">
    <span id="scene-name">Scene: Test Scene</span>
    <span id="block-info">Block 0/0</span>
  </div>

  <button id="vars-toggle" onclick="toggleVars()">📊</button>
  <div id="vars-panel"><h3>Variables</h3><div id="vars-content"></div></div>

  <div id="halt-overlay" onclick="advance()"></div>

  <div id="dialogue-area">
    <div id="dialogue-box">
      <div id="speaker-name"></div>
      <div id="dialogue-text"><span style="color:rgba(255,255,255,0.3)">Tap to begin...</span></div>
      <div id="choices-area"></div>
      <div id="bottom-bar">
        <span id="step-indicator"></span>
        <span id="action-hint">Tap to continue ▼</span>
      </div>
      <div id="block-log"><h3>Execution Log</h3><div id="log-entries"></div></div>
    </div>
  </div>
</div>

<script>
// ═══════ Block Types ═══════
const BLOCK_TYPES = {
  background:   { icon: '🖼', label: 'Background' },
  character:    { icon: '👤', label: 'Character' },
  text:         { icon: '📝', label: 'Text' },
  dialogue:     { icon: '💬', label: 'Dialogue' },
  choice:       { icon: '🔀', label: 'Choice' },
  effect:       { icon: '✨', label: 'Effect' },
  music:        { icon: '🎵', label: 'Music' },
  sound:        { icon: '🔊', label: 'Sound' },
  camera:       { icon: '🎥', label: 'Camera' },
  variable:     { icon: '🔧', label: 'Variable' },
  transition:   { icon: '🔄', label: 'Transition' },
};

// ═══════ Scene State ═══════
let state = {
  backgroundAssetId: null,
  backgroundTransition: 'fade',
  characters: {},
  activeEffects: [],
  variables: {},
  currentChoices: null,
  isTransitioning: false,
  transitionTarget: null,
};

// ═══════ Sample Scene ═══════
const TEST_SCENE = {
  id: 'scene-1',
  name: 'Forest Path',
  timeline: [
    { id: 's1', blockType: 'variable', data: { variableName: 'player_choice', operation: 'set', value: 'none' }, enabled: true },
    { id: 's2', blockType: 'background', data: { assetId: 'forest_day', transition: 'fade', duration: 800 }, enabled: true },
    { id: 's3', blockType: 'character', data: { characterId: 'hero', spriteId: 'hero_stand', position: 'center', transition: 'fade', delay: 0, duration: null }, enabled: true },
    { id: 's4', blockType: 'music', data: { assetId: 'bgm_forest', action: 'play', volume: 0.7, loop: true, fadeDuration: 500 }, enabled: true },
    { id: 's5', blockType: 'text', data: { content: 'A dense forest stretches before you.\nThe air is cool and damp.', typewriterSpeed: 0.5, anchorTo: 'background' }, enabled: true },
    { id: 's6', blockType: 'dialogue', data: { entries: [{ id: 'd1', characterId: 'hero', spriteId: 'hero_stand', text: 'Where am I? How did I get here?' }], currentEntryIndex: 0 }, enabled: true },
    { id: 's7', blockType: 'character', data: { characterId: 'narrator', spriteId: '', position: 'left', transition: 'fade', delay: 0, duration: null }, enabled: true },
    { id: 's8', blockType: 'dialogue', data: { entries: [{ id: 'd2', characterId: 'narrator', spriteId: '', text: 'A mysterious figure emerges from the shadows.' }], currentEntryIndex: 0 }, enabled: true },
    { id: 's9', blockType: 'effect', data: { effectType: 'flash', target: 'screen', intensity: 40, duration: 0.5 }, enabled: true },
    { id: 's10', blockType: 'character', data: { characterId: 'mystery', spriteId: 'mystery_appear', position: 'right', transition: 'fade', delay: 0, duration: null }, enabled: true },
    { id: 's11', blockType: 'dialogue', data: { entries: [{ id: 'd3', characterId: 'mystery', spriteId: 'mystery_appear', text: 'You are not supposed to be here, child.' }], currentEntryIndex: 0 }, enabled: true },
    { id: 's12', blockType: 'variable', data: { variableName: 'met_stranger', operation: 'set', value: true }, enabled: true },
    { id: 's13', blockType: 'effect', data: { effectType: 'vignette', target: 'screen', intensity: 60, duration: 2 }, enabled: true },
    { id: 's14', blockType: 'choice', data: { options: [
      { id: 'c1', text: '"Who are you?"', targetSceneId: 'scene-2' },
      { id: 'c2', text: '"Leave me alone!"', targetSceneId: 'scene-3' },
      { id: 'c3', text: 'Stay silent', targetSceneId: 'scene-4' },
    ]}, enabled: true },
    { id: 's15', blockType: 'character', data: { characterId: 'hero', spriteId: 'hero_stand', position: 'left', transition: 'fade', delay: 0, duration: null, effect: { type: 'shake', intensity: 30, duration: 0.3 } }, enabled: true },
    { id: 's16', blockType: 'camera', data: { action: 'zoom', zoomLevel: 1.3, duration: 1.5, easing: 'ease-in-out' }, enabled: true },
    { id: 's17', blockType: 'transition', data: { targetSceneId: 'scene-2', transitionType: 'fade', duration: 1.0 }, enabled: true },

    // Disabled / conditional blocks
    { id: 's18', blockType: 'sound', data: { assetId: 'sfx_thunder', action: 'play', volume: 0.8, loop: false }, enabled: false },
    { id: 's19', blockType: 'variable', data: { variableName: 'rain', operation: 'set', value: true }, enabled: true, conditions: [{ variableName: 'met_stranger', operator: '==', value: true }] },
  ],
};

let currentIndex = 0;
let isHalted = false;
let typewriterTimer = null;
let isTyping = false;
let logEntries = [];

// ═══════ DOM refs ═══════
const bgLayer = document.getElementById('bg-layer');
const charLayer = document.getElementById('character-layer');
const effectOverlay = document.getElementById('effect-overlay');
const dialogueText = document.getElementById('dialogue-text');
const speakerName = document.getElementById('speaker-name');
const choicesArea = document.getElementById('choices-area');
const stepIndicator = document.getElementById('step-indicator');
const actionHint = document.getElementById('action-hint');
const blockInfo = document.getElementById('block-info');
const logEntriesEl = document.getElementById('log-entries');
const varsContent = document.getElementById('vars-content');
const transitionOverlay = document.getElementById('transition-overlay');

function log(type, msg) {
  logEntries.push({ type, msg });
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.textContent = msg;
  logEntriesEl.appendChild(el);
  logEntriesEl.scrollTop = logEntriesEl.scrollHeight;
}

// ═══════ Block Handlers ═══════

function handleBackground(data) {
  const bgMap = { forest_day: 'linear-gradient(135deg, #1a3a1a, #2d5a2d, #1a3a1a)', cave: 'linear-gradient(135deg, #111, #222, #111)', castle: 'linear-gradient(135deg, #2a1a3a, #3a2a4a)' };
  state.backgroundAssetId = data.assetId;
  bgLayer.style.background = bgMap[data.assetId] || '#1a1a2e';
  bgLayer.classList.add('has-bg');
  log('executed', `🖼 Background: ${data.assetId} (${data.transition}, ${data.duration}ms)`);
}

function handleCharacter(data) {
  const positions = { left: 'translateX(-60px)', center: 'translateX(0)', right: 'translateX(60px)', 'far-left': 'translateX(-120px)', 'far-right': 'translateX(120px)' };
  let charEl = document.getElementById(`char-${data.characterId}`);
  if (!charEl) {
    charEl = document.createElement('div');
    charEl.id = `char-${data.characterId}`;
    charEl.className = 'char-sprite';
    charEl.style.width = '80px';
    charEl.style.background = 'rgba(255,255,255,0.08)';
    charEl.style.borderRadius = '8px';
    charEl.style.border = '1px solid rgba(255,255,255,0.1)';
    charEl.style.display = 'flex';
    charEl.style.alignItems = 'center';
    charEl.style.justifyContent = 'center';
    charEl.style.fontSize = '11px';
    charEl.style.color = 'rgba(255,255,255,0.4)';
    charEl.textContent = data.characterId;
    charLayer.appendChild(charEl);
  }
  charEl.classList.add('visible', data.position);
  charEl.style.transform = positions[data.position] || 'translateX(0)';
  state.characters[data.characterId] = { spriteId: data.spriteId, position: data.position, visible: true };
  log('executed', `👤 Character: ${data.characterId} @ ${data.position}${data.effect ? ` (effect: ${data.effect.type})` : ''}`);
}

function handleText(data) {
  const text = dialogueText.querySelector('.text-content') || dialogueText;
  text.textContent = '';
  dialogueText.innerHTML = '<span class="text-content"></span><span class="cursor">█</span>';
  speakerName.style.display = 'none';
  typewrite(data.content);
  log('executed', `📝 Text: "${data.content.slice(0, 40)}..."`);
}

function handleDialogue(data) {
  const entry = data.entries[data.currentEntryIndex];
  if (!entry) return;
  dialogueText.innerHTML = '<span class="text-content"></span><span class="cursor">█</span>';
  speakerName.style.display = 'block';
  speakerName.textContent = entry.characterId;
  typewrite(entry.text);
  log('executed', `💬 ${entry.characterId}: "${entry.text.slice(0, 40)}..."`);
}

function handleChoice(data) {
  state.currentChoices = data.options;
  choicesArea.style.display = 'flex';
  choicesArea.innerHTML = '';
  data.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.text;
    btn.onclick = () => selectChoice(opt);
    choicesArea.appendChild(btn);
  });
  actionHint.textContent = 'Make a choice...';
  isHalted = true;
  log('halted', `🔀 Choice: ${data.options.length} options`);
}

function handleEffect(data) {
  effectOverlay.className = '';
  if (data.effectType === 'shake') { effectOverlay.classList.add('shake'); }
  else if (data.effectType === 'flash') { effectOverlay.classList.add('flash'); }
  else if (data.effectType === 'vignette') { effectOverlay.classList.add('vignette'); }
  else if (data.effectType === 'rain') { effectOverlay.style.background = 'rgba(100,150,255,0.08)'; setTimeout(() => { effectOverlay.style.background = ''; }, data.duration * 1000); }
  setTimeout(() => { effectOverlay.className = ''; }, data.duration * 1000);
  log('executed', `✨ Effect: ${data.effectType} (${data.intensity}%, ${data.duration}s)`);
}

function handleMusic(data) {
  const act = data.action === 'play' ? '▶' : data.action === 'stop' ? '⏹' : data.action === 'pause' ? '⏸' : '🔉';
  log('executed', `🎵 Music: ${act} ${data.assetId || ''} (vol:${data.volume}, loop:${data.loop})`);
}

function handleSound(data) {
  log('executed', `🔊 Sound: ${data.action} ${data.assetId}`);
}

function handleCamera(data) {
  const transforms = { zoom: `scale(${data.zoomLevel || 1.3})`, pan: `translate(${data.panX || 0}px, ${data.panY || 0}px)` };
  const app = document.getElementById('app');
  app.style.transform = transforms[data.action] || '';
  app.style.transition = `transform ${data.duration}s ${data.easing || 'ease-in-out'}`;
  setTimeout(() => { /* keep transform */ }, data.duration * 1000);
  log('executed', `🎥 Camera: ${data.action}${data.zoomLevel ? ` (${data.zoomLevel}x)` : ''} ${data.duration}s`);
}

function handleVariable(data) {
  const val = typeof data.value === 'string' && !isNaN(Number(data.value)) ? Number(data.value) : data.value;
  if (data.operation === 'set') state.variables[data.variableName] = val;
  else if (data.operation === 'add') state.variables[data.variableName] = (state.variables[data.variableName] || 0) + val;
  else if (data.operation === 'subtract') state.variables[data.variableName] = (state.variables[data.variableName] || 0) - val;
  else if (data.operation === 'toggle') state.variables[data.variableName] = !state.variables[data.variableName];
  updateVarsDisplay();
  log('executed', `🔧 Variable: ${data.variableName} = ${JSON.stringify(state.variables[data.variableName])}`);
}

function handleTransition(data) {
  transitionOverlay.classList.add('active');
  setTimeout(() => {
    if (data.targetSceneId) {
      log('executed', `🔄 Transition: → ${data.targetSceneId} (${data.transitionType}, ${data.duration}s)`);
      resetScene();
      currentIndex = 0;
      executeCurrent();
    }
  }, data.duration * 1000);
  isHalted = true;
}

// ═══════ Condition Check ═══════
function conditionsMet(step) {
  if (!step.conditions || step.conditions.length === 0) return true;
  return step.conditions.every(c => {
    const actual = state.variables[c.variableName];
    if (c.operator === '==') return actual == c.value;
    if (c.operator === '!=') return actual != c.value;
    if (c.operator === '>') return actual > c.value;
    if (c.operator === '<') return actual < c.value;
    return true;
  });
}

// ═══════ Typewriter ═══════
function typewrite(text) {
  if (typewriterTimer) clearInterval(typewriterTimer);
  isTyping = true;
  const contentEl = dialogueText.querySelector('.text-content') || dialogueText;
  contentEl.textContent = '';
  let idx = 0;
  const speed = 30;
  typewriterTimer = setInterval(() => {
    if (idx < text.length) {
      contentEl.textContent += text[idx];
      idx++;
    } else {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      isTyping = false;
      const cursor = dialogueText.querySelector('.cursor');
      if (cursor) cursor.remove();
    }
  }, speed);
}

// ═══════ Execution Engine ═══════
function executeStep(step) {
  if (!step.enabled) {
    log('skipped', `⏭ ${BLOCK_TYPES[step.blockType]?.icon || '?'} ${step.blockType} (disabled)`);
    return 'skip';
  }
  if (!conditionsMet(step)) {
    log('skipped', `⏭ ${BLOCK_TYPES[step.blockType]?.icon || '?'} ${step.blockType} (condition not met)`);
    return 'skip';
  }

  const handlers = {
    background: handleBackground,
    character: handleCharacter,
    text: handleText,
    dialogue: handleDialogue,
    choice: handleChoice,
    effect: handleEffect,
    music: handleMusic,
    sound: handleSound,
    camera: handleCamera,
    variable: handleVariable,
    transition: handleTransition,
  };

  const handler = handlers[step.blockType];
  if (handler) {
    handler(step.data);
    const yielding = ['text', 'dialogue', 'choice', 'transition'];
    if (yielding.includes(step.blockType)) return 'halt';
    return 'continue';
  }
  return 'continue';
}

function advance() {
  if (isTyping) {
    if (typewriterTimer) clearInterval(typewriterTimer);
    typewriterTimer = null;
    isTyping = false;
    const contentEl = dialogueText.querySelector('.text-content') || dialogueText;
    const cursor = dialogueText.querySelector('.cursor');
    if (cursor) cursor.remove();
    return;
  }
  if (state.currentChoices) return;
  if (!isHalted) return;
  isHalted = false;
  choicesArea.style.display = 'none';
  actionHint.textContent = 'Tap to continue ▼';
  currentIndex++;
  executeCurrent();
}

function selectChoice(opt) {
  state.variables.player_choice = opt.id;
  state.currentChoices = null;
  updateVarsDisplay();
  choicesArea.style.display = 'none';
  actionHint.textContent = 'Tap to continue ▼';
  log('executed', `→ Chose: "${opt.text}"`);
  if (opt.targetSceneId) {
    transitionOverlay.classList.add('active');
    setTimeout(() => {
      log('executed', `🔄 Transition to scene: ${opt.targetSceneId}`);
      resetScene();
      currentIndex = 0;
      executeCurrent();
    }, 600);
  }
}

function executeCurrent() {
  const timeline = TEST_SCENE.timeline;
  if (currentIndex >= timeline.length) {
    dialogueText.textContent = '— END OF SCENE —';
    actionHint.textContent = '';
    blockInfo.textContent = 'Scene Complete';
    return;
  }

  const step = timeline[currentIndex];
  blockInfo.textContent = `Block ${currentIndex + 1}/${timeline.length} (${BLOCK_TYPES[step.blockType]?.label || step.blockType})`;
  stepIndicator.textContent = `Step ${currentIndex + 1}/${timeline.length}`;

  const result = executeStep(step);
  if (result === 'continue') {
    currentIndex++;
    setTimeout(executeCurrent, 300);
  } else if (result === 'halt') {
    isHalted = true;
  }
}

function resetScene() {
  currentIndex = 0;
  isHalted = false;
  state = { backgroundAssetId: null, backgroundTransition: 'fade', characters: {}, activeEffects: [], variables: {}, currentChoices: null, isTransitioning: false, transitionTarget: null };
  bgLayer.style.background = '#0f0e17';
  bgLayer.classList.remove('has-bg');
  charLayer.innerHTML = '';
  effectOverlay.className = '';
  transitionOverlay.classList.remove('active');
  dialogueText.innerHTML = '<span style="color:rgba(255,255,255,0.3)">Tap to begin...</span>';
  speakerName.style.display = 'none';
  choicesArea.style.display = 'none';
  choicesArea.innerHTML = '';
  document.getElementById('app').style.transform = '';
  logEntries = [];
  logEntriesEl.innerHTML = '';
  updateVarsDisplay();
}

function toggleVars() {
  const panel = document.getElementById('vars-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function updateVarsDisplay() {
  varsContent.innerHTML = Object.entries(state.variables).map(([k, v]) =>
    `<div class="var-row"><span class="var-name">${k}</span><span class="var-value">${JSON.stringify(v)}</span></div>`
  ).join('');
}

// ═══════ Start ═══════
resetScene();
setTimeout(executeCurrent, 500);
</script>
</body>
</html>
