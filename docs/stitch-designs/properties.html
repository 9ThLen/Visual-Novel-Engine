<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Properties Inspector - Visual Novel Engine</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            extend: {
              "colors": {

                      "tertiary-fixed-dim": "#ffb688",
                      "surface-variant": "#323347",
                      "primary-container": "#7c4dff",
                      "tertiary": "#ffb688",
                      "inverse-primary": "#6833ea",
                      "surface-bright": "#37374c",
                      "on-secondary-fixed": "#161837",
                      "surface-container": "#1d1e31",
                      "surface": "#111224",
                      "secondary": "#c2c3eb",
                      "primary-fixed-dim": "#cdbdff",
                      "outline-variant": "#494455",
                      "surface-container-lowest": "#0b0c1f",
                      "inverse-on-surface": "#2e2f43",
                      "tertiary-fixed": "#ffdbc7",
                      "on-tertiary-fixed": "#311300",
                      "on-primary-fixed-variant": "#4f00d0",
                      "on-error": "#690005",
                      "error": "#ffb4ab",
                      "tertiary-container": "#b55800",
                      "surface-container-low": "#191a2d",
                      "inverse-surface": "#e1e0fb",
                      "outline": "#948ea1",
                      "error-container": "#93000a",
                      "background": "#111224",
                      "on-surface-variant": "#cac3d8",
                      "primary-fixed": "#e8deff",
                      "on-tertiary": "#512400",
                      "surface-container-high": "#27283c",
                      "on-surface": "#e1e0fb",
                      "on-secondary": "#2c2e4d",
                      "secondary-fixed-dim": "#c2c3eb",
                      "secondary-container": "#444668",
                      "on-tertiary-container": "#fff7f4",
                      "on-tertiary-fixed-variant": "#733600",
                      "on-primary-fixed": "#20005f",
                      "primary": "#cdbdff",
                      "on-secondary-fixed-variant": "#424465",
                      "on-primary-container": "#fcf6ff",
                      "on-primary": "#370096",
                      "on-background": "#e1e0fb",

              "spacing": {
                      "unit": "4px",
                      "gutter": "16px",
                      "inspector-width": "280px",
                      "sidebar-width": "320px",
                      "container-padding": "24px"
              },
              "fontFamily": {
                      "display-lg": ["Hanken Grotesk"],
                      "label-md": ["Hanken Grotesk"],
                      "headline-sm": ["Hanken Grotesk"],
                      "code-sm": ["monospace"],
                      "headline-md": ["Hanken Grotesk"],
                      "body-md": ["Hanken Grotesk"],
                      "body-lg": ["Hanken Grotesk"]
              },
              "fontSize": {
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "code-sm": ["12px", {"lineHeight": "18px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
        body { background-color: #111224; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #7c4dff;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface">
<!-- Properties Inspector (Mobile Friendly 300px sidebar) -->
<aside class="fixed right-0 top-0 h-full w-[300px] bg-surface flex flex-col border-l border-outline-variant overflow-hidden">
<!-- Header -->
<header class="p-container-padding flex flex-col gap-2 border-b border-outline-variant bg-surface-container-low">
<div class="flex justify-between items-center">
<h1 class="font-headline-sm text-headline-sm text-on-surface">Properties</h1>
<button class="p-1 hover:bg-surface-bright rounded-lg transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<div class="flex items-center gap-2 text-primary-container">
<span class="material-symbols-outlined text-[20px]" data-icon="chat_bubble">chat_bubble</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Dialogue Block</span>
</div>
</header>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto p-gutter scrollbar-hide space-y-6">
<!-- Speaker Selector -->
<section class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase block">Speaker Selector</label>
<div class="flex items-center justify-between px-3 py-2 bg-surface-container border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container overflow-hidden ring-1 ring-outline-variant">
<img alt="Speaker Avatar" data-alt="A highly detailed profile portrait of a female character named Alice in a vibrant anime art style. She has soft features, expressive eyes, and long flowing hair. The lighting is dramatic and cinematic, reflecting a professional visual novel aesthetic with deep purples and warm highlights that match the editorial UI design system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuApwLagBzzWsmGYMh4RnyfUm7Rdl2-9_m8BbVmkIhHYAZmQMgx2FnczvYxl4_ZFaP6g6OtTzAhXRHL6XSbBs7lAAWqT0uSgiA2-u5RDXMOL8CFbtOq9gy2V4lltxcIHlLpilzLfxTlBfohOk7er1622H0jlteZLVpKRqdE5rdeqbGlT_3kiFfPoIcJUenx1DV5oRvC7UHKd7KGKBDLzekrIFiaPx_RzfJj81PMeju197YZKEF6_qQ94DktapQZb9ijDt9ngbOrppyE"/>
</div>
<span class="font-body-md text-body-md font-semibold">Alice</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
</section>
<div class="h-px bg-outline-variant"></div>
<!-- Sprite Selector -->
<section class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase block">Sprite/Emotion Selector</label>
<div class="grid grid-cols-2 gap-2">
<!-- Happy -->
<button class="group relative aspect-square bg-surface-container border border-outline-variant rounded-lg overflow-hidden hover:border-primary-container transition-all">
<img class="w-full h-full object-cover opacity-60 group-hover:opacity-100" data-alt="A detailed sprite thumbnail of an anime character expressing a happy emotion. The character has a wide smile and bright, twinkling eyes. The artwork is clean, line-focused, and follows a professional manga illustration style with a subtle atmospheric glow." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_ws3R5ytdlfRkVohObI6z2F44sMpWh-4jrct0YA450EjmLpqfUB7zrhV7Kq2jumdlnSNUZhBTSiLxHi782El-fELCIkv5Alkb2ebciMaClRX5kocnpBy8OqKILuF7jp5imrv7hE6aK8NGFiF1hIhPZ2SOTuYGpKfPZQzShfFGkplwWYDbc9Jz-VcLw7G8R7kGsNAzmXHka8Fi5GfogcfT9l6eBuJFD22JQt_qHaiiIB4vZgJkl-1mZEYgABg8shCmjFVg3J9tpso"/>
<div class="absolute bottom-1 left-2 font-label-md text-[10px] uppercase">Happy</div>
</button>
<!-- Sad -->
<button class="group relative aspect-square bg-surface-container border border-outline-variant rounded-lg overflow-hidden hover:border-primary-container transition-all">
<img class="w-full h-full object-cover opacity-60 group-hover:opacity-100" data-alt="A character sprite expressing a sad or somber emotion, featuring downturned eyes and a neutral mouth. The lighting is cool and moody, fitting a dramatic visual novel narrative scene. The art style is consistent with a high-end production suite, emphasizing clean linework and soft shading." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmSU08S5cZ2X9AjaFdxQ1XB-KrunL2hwku9FSyNuIgLKAV5CYTVu3ML19zbsxQ4IZgCnwqsw3XOiv1fFCSs6-a6NanSZOdYhfx07hgvoKYoyIylaZLSpTC1Oa_8n2RaDe6tYgXUoRTPmrEzNDhhcBJEJ2oV62fl3nNO9W3_SxxjDD7ujjsm_oUHz9sSeoLM4tJKkS5WpEImyOAF5iibWRyoJvJKx82EXvZaarjnAk9wGYLKv8NY1KNXI2fbmDDvrhzXLgeSkTojMA"/>
<div class="absolute bottom-1 left-2 font-label-md text-[10px] uppercase">Sad</div>
</button>
<!-- Angry -->
<button class="group relative aspect-square bg-surface-container border border-outline-variant rounded-lg overflow-hidden hover:border-primary-container transition-all">
<img class="w-full h-full object-cover opacity-60 group-hover:opacity-100" data-alt="A detailed character sprite showing an angry or intense emotion. The eyebrows are furrowed, and the expression is stern. The visual style is professional editorial, utilizing a high-contrast palette that integrates seamlessly with the dark mode editor interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsNTeYFxEvk0iZHjiMAqijfwukN4COPm9OH5jl0A060X4wP8yl7hXvLLST9F7VtxvmN_J5xGwITlsn46wSFDHPvQoCsrlvvhehEzMHeg-O-GEItLS3jtCYK9Uh9_Lwu0orwve0fZRgHgGweXjWNBt_lnWc15trqVYvAEG4wFTm4irAv6IbDuILqA7zsTnlcpglPcM1LwV0oESLtrl-uU8KIzLl9YGzwV0oHGmPOgeqXvYTB8vS8T9XobTkJW9Go14TpUHnQLBVHkI"/>
<div class="absolute bottom-1 left-2 font-label-md text-[10px] uppercase">Angry</div>
</button>
<!-- Neutral (Selected) -->
<button class="group relative aspect-square bg-surface-container border-2 border-primary-container rounded-lg overflow-hidden ring-2 ring-primary-container/20">
<img class="w-full h-full object-cover" data-alt="The primary neutral sprite for the character Alice. Her expression is calm and attentive, suitable for standard dialogue. The lighting is balanced and soft, highlighting the high-quality character design intended for a cinematic visual novel production." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_9FJ_rXwdlTNvloh23Jn8puijM1-2yE87XUK7VpLHzQBbZBA6tf4zNkGQY4M7sCyH8QD1zvsw5E0YTO-lv13GVPWtP4pEY5SskfyGKSlvQNHfsD4VwJ-MxYjfvB-ObZ_uS9lAK2d1g5guE_tfs2ZWfF93_pOZ-4suMU7OdlIKno_u5kIUU66yn4vHI-kkRr23tEKctKIfZ3o51NOEWlxc-f-E_G4kMFryo27OxdSXxHOp4yO0nEeoA6XfzrYR7dxI97hyYbd5v2k"/>
<div class="absolute bottom-1 left-2 font-label-md text-[10px] uppercase text-primary-container font-bold">Neutral</div>
<div class="absolute top-1 right-1">
<span class="material-symbols-outlined text-[16px] text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
</section>
<div class="h-px bg-outline-variant"></div>
<!-- Dialogue Text -->
<section class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase block">Dialogue Text</label>
<textarea class="w-full bg-surface-container border border-outline-variant rounded-lg p-3 text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all resize-none" placeholder="Enter dialogue text..." rows="4"></textarea>
</section>
<!-- Typewriter Speed -->
<section class="space-y-3">
<label class="font-label-md text-label-md text-on-surface-variant uppercase block">Typewriter Speed</label>
<div class="px-1">
<input class="w-full h-1 bg-secondary-container rounded-full appearance-none cursor-pointer" type="range" value="50"/>
<div class="flex justify-between mt-2">
<span class="font-label-md text-[10px] text-on-surface-variant">Slow</span>
<span class="font-label-md text-[10px] text-on-surface-variant">Fast</span>
</div>
</div>
</section>
<div class="h-px bg-outline-variant"></div>
<!-- Anchor Selector -->
<section class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase block">Anchor Selector</label>
<div class="space-y-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input checked="" class="peer appearance-none w-5 h-5 border-2 border-outline-variant rounded-full checked:border-primary-container transition-all" name="anchor" type="radio"/>
<div class="absolute w-2.5 h-2.5 bg-primary-container rounded-full scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<span class="font-body-md text-on-surface group-hover:text-primary transition-colors">To Character</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-5 h-5 border-2 border-outline-variant rounded-full checked:border-primary-container transition-all" name="anchor" type="radio"/>
<div class="absolute w-2.5 h-2.5 bg-primary-container rounded-full scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<span class="font-body-md text-on-surface group-hover:text-primary transition-colors">To Background</span>
</label>
</div>
</section>
<!-- Timing Controls -->
<section class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase block whitespace-nowrap">Delay (Seconds)</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none" step="0.1" type="number" value="0.0"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase block whitespace-nowrap">Duration (Seconds)</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none" step="0.1" type="number" value="3.0"/>
</div>
</section>
</div>
<!-- Footer Actions -->
<footer class="p-container-padding bg-surface-container-high border-t border-outline-variant flex flex-col gap-2">
<button class="w-full py-2.5 px-4 bg-outline-variant/10 border border-outline-variant rounded-lg text-on-surface font-body-md hover:bg-surface-bright transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">content_copy</span>
                Duplicate Block
            </button>
<button class="w-full py-2.5 px-4 bg-error-container/20 border border-error/30 text-error rounded-lg font-body-md hover:bg-error-container/40 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">delete</span>
                Delete Block
            </button>
</footer>
</aside>
<!-- Overlay for mobile context (simulated) -->
<div class="fixed inset-0 bg-surface-container-lowest/80 -z-10 md:hidden"></div>
</body></html>
