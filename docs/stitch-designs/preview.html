<script>
        // Simple Interaction: Close choices on click
        const choiceButtons = document.querySelectorAll('.pointer-events-auto button');
        choiceButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                btn.parentElement.style.opacity = '0';
                btn.parentElement.style.transform = 'translateY(20px)';
                btn.parentElement.style.transition = 'all 0.5s ease-in-out';
                setTimeout(() => {
                    btn.parentElement.style.display = 'none';
                }, 500);
            });
        });

        // Atmospheric Particle Effect (Optional/Subtle)
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'absolute bg-white/20 rounded-full blur-[1px] pointer-events-none z-20';
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.bottom = `-10px`;
            particle.style.opacity = Math.random() * 0.5;
            
            document.body.appendChild(particle);

            const duration = Math.random() * 5000 + 5000;
            const animation = particle.animate([
                { transform: 'translateY(0) translateX(0)', opacity: particle.style.opacity },
                { transform: `translateY(-105vh) translateX(${(Math.random() - 0.5) * 100}px)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear'
            });

            animation.onfinish = () => particle.remove();
        }

        setInterval(createParticle, 300);
    </script>
