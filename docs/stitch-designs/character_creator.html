<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Character Creator | Narrative Engine</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #111224;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #111224;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #494455;
            border-radius: 10px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-high": "#27283c",
                      "on-secondary": "#2c2e4d",
                      "on-surface": "#e1e0fb",
                      "on-surface-variant": "#cac3d8",
                      "primary-fixed": "#e8deff",
                      "on-tertiary": "#512400",
                      "on-primary-container": "#fcf6ff",
                      "on-primary": "#370096",
                      "surface-tint": "#cdbdff",
                      "surface-container-highest": "#323347",
                      "on-background": "#e1e0fb",
                      "secondary-fixed-dim": "#c2c3eb",
                      "secondary-container": "#444668",
                      "on-tertiary-container": "#fff7f4",
                      "on-tertiary-fixed-variant": "#733600",
                      "on-secondary-fixed-variant": "#424465",
                      "on-primary-fixed": "#20005f",
                      "primary": "#cdbdff",
                      "surface-bright": "#37374c",
                      "tertiary": "#ffb688",
                      "inverse-primary": "#6833ea",
                      "surface-container": "#1d1e31",
                      "surface": "#111224",
                      "secondary": "#c2c3eb",
                      "on-secondary-fixed": "#161837",
                      "secondary-fixed": "#e0e0ff",
                      "on-error-container": "#ffdad6",
                      "on-secondary-container": "#b4b5dd",
                      "surface-dim": "#111224",
                      "surface-variant": "#323347",
                      "primary-container": "#7c4dff",
                      "tertiary-fixed-dim": "#ffb688",
                      "surface-container-low": "#191a2d",
                      "inverse-surface": "#e1e0fb",
                      "outline": "#948ea1",
                      "error": "#ffb4ab",
                      "tertiary-container": "#b55800",
                      "error-container": "#93000a",
                      "background": "#111224",
                      "primary-fixed-dim": "#cdbdff",
                      "outline-variant": "#494455",
                      "tertiary-fixed": "#ffdbc7",
                      "on-tertiary-fixed": "#311300",
                      "on-primary-fixed-variant": "#4f00d0",
                      "on-error": "#690005",
                      "surface-container-lowest": "#0b0c1f",
                      "inverse-on-surface": "#2e2f43"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-padding": "24px",
                      "inspector-width": "280px",
                      "unit": "4px",
                      "gutter": "16px",
                      "sidebar-width": "320px"
              },
              "fontFamily": {
                      "headline-md": ["Hanken Grotesk"],
                      "body-md": ["Hanken Grotesk"],
                      "body-lg": ["Hanken Grotesk"],
                      "code-sm": ["monospace"],
                      "headline-sm": ["Hanken Grotesk"],
                      "label-md": ["Hanken Grotesk"],
                      "display-lg": ["Hanken Grotesk"]
              },
              "fontSize": {
                      "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                      "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                      "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                      "code-sm": ["12px", { "lineHeight": "18px", "fontWeight": "400" }],
                      "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                      "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                      "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40"></div>
<!-- Character Creator Modal -->
<div class="relative z-50 w-full max-w-[700px] bg-surface-container border border-outline-variant rounded-xl shadow-2xl flex flex-col max-h-[795px]">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 border-b border-outline-variant">
<h1 class="font-headline-md text-headline-md text-on-surface">Create Character</h1>
<button class="p-2 hover:bg-surface-container-high rounded-full transition-colors text-on-surface-variant hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Form Content -->
<main class="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
<!-- Character Name Section -->
<section class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">NAME</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-on-surface-variant/40" placeholder="Enter character name" type="text"/>
</section>
<!-- Color Picker Section -->
<section class="space-y-3">
<label class="font-label-md text-label-md text-on-surface-variant block">THEME COLOR</label>
<div class="flex flex-wrap gap-3">
<!-- Red -->
<button class="w-8 h-8 rounded-full bg-red-500 hover:scale-110 transition-transform"></button>
<!-- Orange -->
<button class="w-8 h-8 rounded-full bg-orange-500 hover:scale-110 transition-transform"></button>
<!-- Yellow -->
<button class="w-8 h-8 rounded-full bg-yellow-400 hover:scale-110 transition-transform"></button>
<!-- Green -->
<button class="w-8 h-8 rounded-full bg-green-500 hover:scale-110 transition-transform"></button>
<!-- Teal -->
<button class="w-8 h-8 rounded-full bg-teal-500 hover:scale-110 transition-transform"></button>
<!-- Blue -->
<button class="w-8 h-8 rounded-full bg-blue-500 hover:scale-110 transition-transform"></button>
<!-- Purple (Selected) -->
<button class="w-8 h-8 rounded-full bg-[#7c4dff] ring-2 ring-white ring-offset-2 ring-offset-surface-container scale-110 transition-transform"></button>
<!-- Pink -->
<button class="w-8 h-8 rounded-full bg-pink-500 hover:scale-110 transition-transform"></button>
<!-- Brown -->
<button class="w-8 h-8 rounded-full bg-amber-900 hover:scale-110 transition-transform"></button>
<!-- Gray -->
<button class="w-8 h-8 rounded-full bg-slate-500 hover:scale-110 transition-transform"></button>
</div>
</section>
<!-- Voice Selector Section -->
<section class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">VOICE</label>
<div class="relative">
<select class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md appearance-none focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none transition-all">
<option value="male">Male</option>
<option value="female">Female</option>
<option value="none">None</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</section>
<!-- Sprites Section -->
<section class="space-y-4">
<label class="font-label-md text-label-md text-on-surface-variant block">SPRITES</label>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
<!-- Slot 1: Active Sprite -->
<div class="group relative aspect-[3/4] bg-surface rounded-lg border border-outline-variant overflow-hidden">
<img alt="Character Preview" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="A stylized digital painting of a sophisticated female character for a visual novel. She has silver hair and intense violet eyes, set against a dark, atmospheric background with subtle purple lens flares. The lighting is dramatic and moody, fitting a professional editorial production style with sharp details and high contrast." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCv2Ly8hs7dfIYMchGMWHneYFagE6a1LPWJ22kX3MDhWu-a60rfbK4C2yGT4lfAYxl2GOEFbnPLyn3c4F9jJ_grGGEx-Pd0a2rndk9SWqfsJhJkPWVLSN-HREPeKRM_L1U2E35DNqAioHRRVGD5dUsmmQP7s6B24gB5QkB8ctMd1_fW61EFv9HEBOKGD29CPGUYvj7mILi5RMZl6cPCw1G3TH-ogSoGcEAXBiNIwahP0e03YK95mPS-0QZVtUxDoct1MHqIZFpZbhA"/>
<button class="absolute top-2 right-2 w-8 h-8 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center text-error hover:bg-error hover:text-white transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="delete">delete</span>
</button>
</div>
<!-- Slot 2: Add Action -->
<button class="aspect-[3/4] bg-surface border-2 border-dashed border-outline-variant rounded-lg flex flex-col items-center justify-center gap-2 text-on-surface-variant hover:bg-surface-bright hover:border-primary-container transition-all group">
<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform" data-icon="add_circle">add_circle</span>
<span class="font-label-md text-label-md">Add Sprite</span>
</button>
<!-- Slot 3: Empty -->
<div class="aspect-[3/4] border-2 border-dashed border-outline-variant/30 rounded-lg"></div>
<!-- Slot 4: Empty -->
<div class="aspect-[3/4] border-2 border-dashed border-outline-variant/30 rounded-lg"></div>
</div>
<button class="w-full py-3 border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                    Add Sprite Slot
                </button>
</section>
</main>
<!-- Footer Actions -->
<footer class="px-6 py-5 border-t border-outline-variant flex items-center justify-end gap-3">
<button class="px-6 py-2.5 rounded-lg border border-outline-variant font-label-md text-label-md text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-all">
                Cancel
            </button>
<button class="px-8 py-2.5 rounded-lg bg-primary-container font-headline-sm text-[14px] text-white hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-primary-container/20">
                Create Character
            </button>
</footer>
</div>
<script>
        // Simple micro-interactions for the color picker
        const swatches = document.querySelectorAll('section:nth-of-type(2) button');
        swatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                swatches.forEach(s => s.classList.remove('ring-2', 'ring-white', 'ring-offset-2', 'ring-offset-surface-container', 'scale-110'));
                swatch.classList.add('ring-2', 'ring-white', 'ring-offset-2', 'ring-offset-surface-container', 'scale-110');
            });
        });

        // Close button and Cancel functionality simulation
        const closeBtn = document.querySelector('header button');
        const cancelBtn = document.querySelector('footer button:first-child');
        
        const closeModal = () => {
            const modal = document.querySelector('.relative.z-50');
            const backdrop = document.querySelector('.fixed.inset-0');
            modal.style.opacity = '0';
            modal.style.transform = 'translateY(20px)';
            backdrop.style.opacity = '0';
            setTimeout(() => {
                modal.parentElement.style.display = 'none';
            }, 300);
        };

        [closeBtn, cancelBtn].forEach(el => el.addEventListener('click', closeModal));
    </script>
</body></html>
